<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Carregando...</title>
    <script>
        // Substitua os links abaixo pelos sites que você deseja colocar
        const sites = [
            "https://google.com",
            "https://wikipedia.org",
            "https://youtube.com"
        ];

        // Sorteia um site da lista
        const siteAleatorio = sites[Math.floor(Math.random() * sites.length)];

        // Redireciona o usuário imediatamente
        window.location.href = siteAleatorio;
    </script>
</head>
<body>
    <p>Redirecionando...</p>
</body>
</html>
